<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upgrade Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d94;
            --secondary: #7000ff;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(255, 77, 148, 0.12) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-wrapper {
            width: 100%;
            height: 380px;
            background: #000;
            position: relative;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .content {
            padding: 32px;
            text-align: center;
        }

        .tag {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 77, 148, 0.2);
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 16px 0;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        p {
            color: #9ca3af;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 300;
        }

        p b {
            color: #fff;
            font-weight: 600;
        }

        .progress-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 32px;
        }

        .bar-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 4%; /* <--- TADY UPRAV PROCENTA */
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 20px rgba(255, 77, 148, 0.4);
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
        }

        .raised { color: #fff; }
        .goal { color: var(--primary); }

        .pay-button {
            display: block;
            width: 100%;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .pay-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.15);
            background: #fdfdfd;
        }

        .pay-button:active {
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 24px;
            font-size: 11px;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-wrapper">
        <img src="https://i.ibb.co/sJ1gVCm8/Blur-16284-copy.jpg" alt="Evolution">
    </div>

    <div class="content">
        <div class="tag">Human Evolution</div>
        <h1>Stop the caveman era.</h1>
        
        <p>
            Let's be real. Help me buy a decent <b>pocket pussy</b> so I can stop jerking off like a caveman. Target: $50 (no cheap AliExpress crap).
        </p>

        <div class="progress-card">
            <div class="bar-container">
                <div class="bar-fill" style="width: 2%;"></div>
            </div>
            <div class="stats">
                <span class="raised">$0 raised</span>
                <span class="goal">Goal: $50</span>
            </div>
        </div>

        <a href="https://paypal.me/Davisoppxx" target="_blank" class="pay-button">End the Struggle</a>

        <div class="footer-note">
            Direct via PayPal • 100% Transparency
        </div>
    </div>
</div>

</body>
</html>
